<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKS Platform Observability - Grafana</title>
<style>
  :root {
    --g-bg-canvas: #111217;
    --g-bg-primary: #181b1f;
    --g-bg-secondary: #22252b;
    --g-border-weak: #2c3035;
    --g-border-medium: #34383e;
    --g-text-primary: #ccccdc;
    --g-text-secondary: #8e8ea0;
    --g-text-disabled: #6e6e80;
    --g-navbar-bg: #1d1f25;
    --g-sidemenu-bg: #111217;
    --g-green: #73bf69;
    --g-yellow: #f2cc0c;
    --g-orange: #ff9830;
    --g-red: #f2495c;
    --g-blue: #5794f2;
    --g-purple: #b877d9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--g-bg-canvas);
    color: var(--g-text-primary);
    font-family: Inter, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
  }

  /* ═══ SIDEBAR (collapsed) ═══ */
  .g-sidemenu {
    width: 56px; min-width: 56px;
    background: var(--g-sidemenu-bg);
    border-right: 1px solid var(--g-border-weak);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; z-index: 10;
  }
  .g-sidemenu-logo { width: 32px; height: 32px; margin-bottom: 16px; padding: 4px; }
  .g-sidemenu-item {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; margin-bottom: 2px;
    color: var(--g-text-disabled); cursor: pointer;
  }
  .g-sidemenu-item:hover { background: var(--g-bg-secondary); color: var(--g-text-primary); }
  .g-sidemenu-item.active { background: var(--g-bg-secondary); color: #fff; }
  .g-sidemenu-item svg { width: 20px; height: 20px; }
  .g-sidemenu-spacer { flex: 1; }

  /* ═══ MAIN ═══ */
  .g-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* ═══ TOP NAVBAR ═══ */
  .g-navbar {
    height: 52px; min-height: 52px;
    background: var(--g-navbar-bg);
    border-bottom: 1px solid var(--g-border-weak);
    display: flex; align-items: center;
    padding: 0 16px; gap: 8px;
  }
  .g-navbar-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  .g-navbar-folder { color: var(--g-text-secondary); font-size: 13px; }
  .g-navbar-sep { color: var(--g-text-disabled); font-size: 12px; }
  .g-navbar-title { font-weight: 500; font-size: 14px; }
  .g-navbar-spacer { flex: 1; }
  .g-navbar-actions { display: flex; align-items: center; gap: 6px; }
  .g-btn {
    height: 32px; padding: 0 12px;
    border: 1px solid var(--g-border-medium); border-radius: 4px;
    background: transparent; color: var(--g-text-secondary);
    font-size: 12px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .g-btn:hover { color: var(--g-text-primary); border-color: var(--g-text-disabled); }
  .g-btn svg { width: 14px; height: 14px; }
  .g-time-picker {
    background: var(--g-bg-secondary); border: 1px solid var(--g-border-medium);
    border-radius: 4px; padding: 0 10px; height: 32px;
    color: var(--g-text-primary); font-size: 12px; font-family: inherit;
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .g-time-picker svg { width: 14px; height: 14px; color: var(--g-text-secondary); }
  .g-refresh-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--g-border-medium); border-radius: 4px;
    background: transparent; color: var(--g-text-secondary);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .g-refresh-interval {
    font-size: 12px; color: var(--g-text-secondary);
    border: 1px solid var(--g-border-medium); border-radius: 4px;
    padding: 0 8px; height: 32px;
    display: flex; align-items: center; gap: 4px; cursor: pointer;
    background: transparent;
  }
  .g-kiosk-indicator {
    font-size: 10px; color: var(--g-text-disabled);
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 2px 6px; border: 1px solid var(--g-border-weak); border-radius: 3px;
  }

  /* ═══ DASHBOARD BODY ═══ */
  .g-dashboard-scroll { flex: 1; overflow: hidden; padding: 8px; }
  .g-dashboard { height: 100%; display: flex; flex-direction: column; gap: 4px; }

  /* ═══ ROW HEADER (Grafana native — title text only) ═══ */
  .g-row-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 4px; height: 26px; min-height: 26px; cursor: pointer;
  }
  .g-row-chevron { width: 14px; height: 14px; color: var(--g-text-disabled); transform: rotate(90deg); }
  .g-row-title { font-size: 13px; font-weight: 500; }
  .g-row-line { flex: 1; height: 1px; background: var(--g-border-weak); }

  /* ═══ PANEL ROW ═══ */
  .g-panel-row {
    flex: 1; display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px; min-height: 0;
  }

  /* ═══ PANEL (matches Grafana exactly — 2px radius, weak border) ═══ */
  .g-panel {
    background: var(--g-bg-primary);
    border: 1px solid var(--g-border-weak);
    border-radius: 2px;
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }
  .g-panel:hover { border-color: var(--g-border-medium); }
  .g-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px; height: 26px; min-height: 26px;
  }
  .g-panel-title {
    font-size: 12px; font-weight: 500;
    color: var(--g-text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .g-panel-menu {
    color: var(--g-text-disabled); cursor: pointer;
    font-size: 14px; opacity: 0; transition: opacity 0.15s;
  }
  .g-panel:hover .g-panel-menu { opacity: 1; }
  .g-panel-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4px 8px; position: relative; min-height: 0;
  }

  /* ═══ STAT PANEL (native Grafana Stat visualization) ═══ */
  .g-stat-value {
    font-size: clamp(20px, 2.8vw, 38px);
    font-weight: 500; font-variant-numeric: tabular-nums; line-height: 1;
  }
  .g-stat-unit {
    font-size: 14px; color: var(--g-text-disabled);
    font-weight: 400; margin-left: 2px;
  }
  .g-stat-name {
    font-size: 11px; color: var(--g-text-secondary); margin-top: 4px;
  }

  /* ═══ SPARKLINE (Stat panel graph mode = area — native) ═══ */
  .g-sparkline {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 40%; opacity: 0.15; pointer-events: none;
  }
  .g-sparkline svg { width: 100%; height: 100%; display: block; }
  .g-sparkline .line { fill: none; stroke-width: 1.5; }
  .g-sparkline .fill { stroke: none; opacity: 0.5; }

  /* ═══ GAUGE PANEL (semicircle 180° — native Grafana) ═══ */
  .g-gauge-wrap {
    position: relative; width: 100px; height: 58px; overflow: hidden;
  }
  .g-gauge-svg { width: 100px; height: 100px; position: absolute; top: 0; left: 0; }
  .g-gauge-label {
    position: absolute; bottom: 2px; left: 0; right: 0; text-align: center;
  }
  .g-gauge-pct {
    font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums;
  }
  .g-gauge-markers {
    display: flex; justify-content: space-between;
    width: 100px; font-size: 9px; color: var(--g-text-disabled); margin-top: 2px;
  }

  /* ═══ BAR GAUGE PANEL (native Grafana horizontal bar gauge) ═══ */
  .g-bar-gauge { width: 88%; }
  .g-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .g-bar-label {
    font-size: 11px; color: var(--g-text-secondary);
    width: 50px; text-align: right; flex-shrink: 0;
  }
  .g-bar-track {
    flex: 1; height: 10px;
    background: var(--g-bg-secondary); border-radius: 0; overflow: hidden;
  }
  .g-bar-fill { height: 100%; transition: width 0.8s ease; }
  .g-bar-value {
    font-size: 12px; font-weight: 500;
    width: 38px; text-align: right; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<nav class="g-sidemenu">
  <svg class="g-sidemenu-logo" viewBox="0 0 60 60" fill="none">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#f46800" stroke-width="3"/>
    <circle cx="30" cy="30" r="18" fill="none" stroke="#f46800" stroke-width="2.5"/>
    <circle cx="30" cy="30" r="8" fill="#f46800"/>
    <line x1="30" y1="2" x2="30" y2="10" stroke="#f46800" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="50" x2="30" y2="58" stroke="#f46800" stroke-width="3" stroke-linecap="round"/>
    <line x1="2" y1="30" x2="10" y2="30" stroke="#f46800" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="30" x2="58" y2="30" stroke="#f46800" stroke-width="3" stroke-linecap="round"/>
    <line x1="9" y1="9" x2="15" y2="15" stroke="#f46800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="45" y1="45" x2="51" y2="51" stroke="#f46800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="51" y1="9" x2="45" y2="15" stroke="#f46800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="45" x2="9" y2="51" stroke="#f46800" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <div class="g-sidemenu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  <div class="g-sidemenu-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
  <div class="g-sidemenu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></div>
  <div class="g-sidemenu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
  <div class="g-sidemenu-spacer"></div>
  <div class="g-sidemenu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
  <div class="g-sidemenu-item" style="margin-top:4px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
</nav>

<!-- ═══ MAIN ═══ -->
<div class="g-main">
  <header class="g-navbar">
    <div class="g-navbar-breadcrumb">
      <span class="g-navbar-folder">Dashboards</span>
      <span class="g-navbar-sep">/</span>
      <span class="g-navbar-folder">Production</span>
      <span class="g-navbar-sep">/</span>
      <span class="g-navbar-title">EKS Platform Observability</span>
    </div>
    <div class="g-navbar-spacer"></div>
    <div class="g-navbar-actions">
      <span class="g-kiosk-indicator">TV MODE</span>
      <button class="g-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share</button>
      <div class="g-time-picker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Last 1 hour
      </div>
      <button class="g-refresh-btn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <div class="g-refresh-interval">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="6 9 12 15 18 9"/></svg>
        30s
      </div>
      <div style="font-size:12px;color:var(--g-text-disabled)" id="clock"></div>
    </div>
  </header>

  <div class="g-dashboard-scroll">
    <div class="g-dashboard" id="dashboard"></div>
  </div>
</div>

<script>
const systems = [
  {
    name: "System A", cluster: "eks-prod-apse1", namespace: "system-a-prod",
    pods: { ready: 12, total: 12 }, health: "healthy",
    uptime: 99.97, slaTarget: 99.95,
    latencyP95: 42, latencyTrend: "down",
    errorRate: 0.02, errorTrend: "flat",
    throughput: 3420, throughputTrend: "up",
    cpu: 45, memory: 62, critAlerts: 0
  },
  {
    name: "System B", cluster: "eks-prod-apse1", namespace: "system-b-prod",
    pods: { ready: 8, total: 8 }, health: "warning",
    uptime: 99.82, slaTarget: 99.90,
    latencyP95: 185, latencyTrend: "up",
    errorRate: 1.24, errorTrend: "up",
    throughput: 1850, throughputTrend: "flat",
    cpu: 72, memory: 78, critAlerts: 0
  },
  {
    name: "System C", cluster: "eks-prod-apse1", namespace: "system-c-prod",
    pods: { ready: 6, total: 6 }, health: "healthy",
    uptime: 99.99, slaTarget: 99.95,
    latencyP95: 28, latencyTrend: "flat",
    errorRate: 0.01, errorTrend: "down",
    throughput: 8920, throughputTrend: "up",
    cpu: 38, memory: 51, critAlerts: 0
  },
  {
    name: "System D", cluster: "eks-prod-apse1", namespace: "system-d-prod",
    pods: { ready: 3, total: 5 }, health: "critical",
    uptime: 98.41, slaTarget: 99.90,
    latencyP95: 1240, latencyTrend: "up",
    errorRate: 8.73, errorTrend: "up",
    throughput: 620, throughputTrend: "down",
    cpu: 94, memory: 91, critAlerts: 2
  }
];

function sparkSVG(color, trend, jitter) {
  const n = 50, vals = []; let v = 50 + (Math.random()-.5)*20;
  for (let i = 0; i < n; i++) {
    v += (Math.random()-.5) * (jitter ? 14 : 5);
    if (trend === "up") v += 0.4;
    if (trend === "down") v -= 0.3;
    v = Math.max(5, Math.min(95, v)); vals.push(v);
  }
  const w = 400, h = 60, step = w/(n-1);
  const pts = vals.map((v,i) => `${(i*step).toFixed(1)},${(h-v/100*h).toFixed(1)}`);
  const line = `M${pts.join(" L")}`;
  const fill = `${line} L${w},${h} L0,${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="fill" d="${fill}" fill="${color}"/>
    <path class="line" d="${line}" stroke="${color}"/>
  </svg>`;
}

/* Grafana native semicircle gauge (180°) with threshold marker */
function gaugeSVG(pct, color, target) {
  const cx = 50, cy = 50, r = 40;
  const circ = Math.PI * r;
  const dashFill = circ * Math.min(pct, 100) / 100;
  const dashGap = circ - dashFill;
  const tAngle = Math.PI * (target / 100);
  const tx = 10 + 80 * (target / 100);
  const ty = cy - r * Math.sin(tAngle);
  return `<svg class="g-gauge-svg" viewBox="0 0 100 100">
    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="var(--g-bg-secondary)" stroke-width="7" stroke-linecap="round"/>
    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${dashFill.toFixed(1)} ${dashGap.toFixed(1)}"/>
    <line x1="${tx.toFixed(1)}" y1="48" x2="${tx.toFixed(1)}" y2="52" stroke="var(--g-text-disabled)" stroke-width="2" stroke-linecap="round"/>
  </svg>`;
}

function colorHealth(h) { return ({healthy:"var(--g-green)",warning:"var(--g-yellow)",critical:"var(--g-red)"})[h]; }
function colorLat(ms) { return ms<100?"var(--g-green)":ms<500?"var(--g-yellow)":"var(--g-red)"; }
function colorErr(e) { return e<0.1?"var(--g-green)":e<1?"var(--g-yellow)":e<5?"var(--g-orange)":"var(--g-red)"; }
function colorRes(v) { return v<60?"var(--g-green)":v<80?"var(--g-yellow)":"var(--g-red)"; }
function healthText(sys) {
  const r = sys.pods.ready / sys.pods.total;
  return r >= 1 ? "HEALTHY" : r >= 0.5 ? "DEGRADED" : "DOWN";
}

const dashboard = document.getElementById("dashboard");

systems.forEach(sys => {
  const hc = colorHealth(sys.health);
  const slaMet = sys.uptime >= sys.slaTarget;
  const slaC = slaMet ? "var(--g-green)" : "var(--g-red)";
  const latC = colorLat(sys.latencyP95);
  const errC = colorErr(sys.errorRate);
  const cpuC = colorRes(sys.cpu);
  const memC = colorRes(sys.memory);
  const alertC = sys.critAlerts > 0 ? "var(--g-red)" : "var(--g-green)";

  const rh = document.createElement("div");
  rh.className = "g-row-header";
  rh.innerHTML = `
    <svg class="g-row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span class="g-row-title">${sys.name} — ${sys.cluster} / ${sys.namespace}</span>
    <div class="g-row-line"></div>`;

  const pr = document.createElement("div");
  pr.className = "g-panel-row";
  pr.innerHTML = `
    <!-- Col 1: Health — Stat panel + value mapping -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Health Status</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${hc}">${healthText(sys)}</div>
        <div class="g-stat-name">${sys.pods.ready}/${sys.pods.total} pods</div>
      </div>
    </div>

    <!-- Col 2: Uptime — Gauge panel (semicircle) -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Uptime / SLA</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-gauge-wrap">
          ${gaugeSVG(sys.uptime, slaC, sys.slaTarget)}
          <div class="g-gauge-label">
            <span class="g-gauge-pct" style="color:${slaC}">${sys.uptime.toFixed(2)}%</span>
          </div>
        </div>
        <div class="g-gauge-markers"><span>0%</span><span>T:${sys.slaTarget}%</span><span>100%</span></div>
      </div>
    </div>

    <!-- Col 3: Latency P95 — Stat panel + sparkline -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Latency P95</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${latC}">${
          sys.latencyP95 >= 1000
            ? (sys.latencyP95/1000).toFixed(1)+'<span class="g-stat-unit">s</span>'
            : sys.latencyP95+'<span class="g-stat-unit">ms</span>'
        }</div>
        <div class="g-sparkline">${sparkSVG(latC, sys.latencyTrend, sys.health==='critical')}</div>
      </div>
    </div>

    <!-- Col 4: Error Rate — Stat panel + sparkline -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Error Rate</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${errC}">${sys.errorRate}<span class="g-stat-unit">%</span></div>
        <div class="g-sparkline">${sparkSVG(errC, sys.errorTrend, sys.errorRate > 5)}</div>
      </div>
    </div>

    <!-- Col 5: Throughput — Stat panel + sparkline -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Throughput</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:var(--g-blue)">${
          sys.throughput >= 1000
            ? (sys.throughput/1000).toFixed(1)+'K'
            : sys.throughput
        }<span class="g-stat-unit">rpm</span></div>
        <div class="g-sparkline">${sparkSVG('var(--g-blue)', sys.throughputTrend, false)}</div>
      </div>
    </div>

    <!-- Col 6: Resources — Bar Gauge panel -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">CPU / Memory</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-bar-gauge">
          <div class="g-bar-row">
            <span class="g-bar-label">CPU</span>
            <div class="g-bar-track"><div class="g-bar-fill" style="width:${sys.cpu}%;background:${cpuC}"></div></div>
            <span class="g-bar-value" style="color:${cpuC}">${sys.cpu}%</span>
          </div>
          <div class="g-bar-row">
            <span class="g-bar-label">Memory</span>
            <div class="g-bar-track"><div class="g-bar-fill" style="width:${sys.memory}%;background:${memC}"></div></div>
            <span class="g-bar-value" style="color:${memC}">${sys.memory}%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Col 7: Critical Alerts — Stat panel (single value) -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Critical Alerts</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${alertC}">${sys.critAlerts}</div>
        <div class="g-stat-name">${sys.critAlerts === 0 ? 'no critical alerts' : 'firing'}</div>
      </div>
    </div>
  `;

  dashboard.appendChild(rh);
  dashboard.appendChild(pr);
});

function tick() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+" "+
    now.toLocaleTimeString("en-GB",{hour12:false});
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
