<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Management Simulator</title>
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1932;
    --surface2: #232147;
    --border: #2d2b55;
    --text: #e8e6ff;
    --text-dim: #9896b8;
    --accent: #6366f1;
    --accent-glow: #6366f140;
    --red: #ef4444;
    --red-bg: #450a0a;
    --orange: #f59e0b;
    --orange-bg: #451a03;
    --blue: #3b82f6;
    --blue-bg: #0c2340;
    --green: #10b981;
    --green-bg: #052e16;
    --purple: #8b5cf6;
    --purple-bg: #1a1040;
    --cyan: #0ea5e9;
    --cyan-bg: #0c2340;
    --yellow: #fbbf24;
    --yellow-bg: #2a1e06;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }

  .header-controls { display: flex; gap: 12px; align-items: center; }

  .timer {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 20px;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid var(--green);
    padding: 4px 14px;
    border-radius: 8px;
    min-width: 90px;
    text-align: center;
    transition: color .3s, border-color .3s, background .3s;
  }
  .timer.sev1 { color: var(--red); border-color: var(--red); background: var(--red-bg); }
  .timer.sev2 { color: var(--orange); border-color: var(--orange); background: var(--orange-bg); }

  /* ── Layout ── */
  .app { display: flex; height: calc(100vh - 57px); }

  /* ── Left: Phase Progress ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 16px; }

  .phase-list { list-style: none; }
  .phase-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    position: relative;
  }
  .phase-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 13px;
    top: 36px;
    bottom: -4px;
    width: 2px;
    background: var(--border);
  }
  .phase-item.active:not(:last-child)::after { background: var(--accent); }
  .phase-item.done:not(:last-child)::after { background: var(--green); }

  .phase-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    transition: all .3s;
  }
  .phase-item.active .phase-dot { border-color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 12px var(--accent-glow); }
  .phase-item.done .phase-dot { border-color: var(--green); background: var(--green-bg); }

  .phase-info h3 { font-size: 14px; font-weight: 500; color: var(--text-dim); transition: color .3s; }
  .phase-item.active .phase-info h3 { color: var(--text); font-weight: 600; }
  .phase-item.done .phase-info h3 { color: var(--green); }
  .phase-info p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ── Center: Main Stage ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .stage {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 640px;
    width: 100%;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .stage-card h2 { font-size: 22px; margin-bottom: 8px; }
  .stage-card .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .stage-card p { font-size: 14px; line-height: 1.7; color: var(--text-dim); margin-bottom: 16px; }

  /* Scenario cards */
  .scenario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .scenario-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }
  .scenario-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px var(--accent-glow); }
  .scenario-card h4 { font-size: 14px; margin-bottom: 6px; }
  .scenario-card p { font-size: 12px; color: var(--text-dim); margin: 0; }
  .scenario-card .sev-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }
  .sev-tag.s1 { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
  .sev-tag.s2 { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange); }
  .sev-tag.s3 { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue); }

  /* Decision buttons */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .choice-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .choice-btn:hover { border-color: var(--accent); background: #232147; }
  .choice-btn .icon { font-size: 20px; flex-shrink: 0; }
  .choice-btn .label { font-weight: 500; }
  .choice-btn .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* Checklist */
  .checklist { list-style: none; margin-top: 16px; }
  .checklist li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--surface2);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .2s;
    font-size: 14px;
  }
  .checklist li:hover { border-color: var(--border); }
  .checklist li .check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
    font-size: 13px;
  }
  .checklist li.checked .check { background: var(--green); border-color: var(--green); }
  .checklist li.checked { color: var(--green); }

  .proceed-btn {
    margin-top: 24px;
    padding: 12px 28px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    opacity: 0.3;
    pointer-events: none;
  }
  .proceed-btn.ready { opacity: 1; pointer-events: auto; }
  .proceed-btn.ready:hover { background: #5558e6; transform: translateY(-1px); }

  .restart-btn {
    margin-top: 16px;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .restart-btn:hover { border-color: var(--text-dim); color: var(--text); }

  /* ── Right: Timeline ── */
  .timeline-panel {
    width: 320px;
    min-width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .timeline-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .timeline-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }

  .comms-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--cyan-bg);
    color: var(--cyan);
    border: 1px solid var(--cyan);
    animation: pulse 2s infinite;
  }
  .comms-badge.off { animation: none; opacity: 0.4; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .timeline-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .tl-entry {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #1a193220;
    animation: fadeIn .3s ease;
  }
  .tl-time {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 52px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .tl-content { font-size: 13px; line-height: 1.5; }
  .tl-content .tl-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tl-tag.detect { background: var(--purple-bg); color: var(--purple); }
  .tl-tag.triage { background: var(--accent-glow); color: var(--accent); }
  .tl-tag.contain { background: var(--red-bg); color: var(--red); }
  .tl-tag.resolve { background: var(--orange-bg); color: var(--orange); }
  .tl-tag.assess { background: var(--yellow-bg); color: var(--yellow); }
  .tl-tag.fix { background: var(--blue-bg); color: var(--blue); }
  .tl-tag.data { background: var(--yellow-bg); color: var(--yellow); }
  .tl-tag.rca { background: var(--purple-bg); color: var(--purple); }
  .tl-tag.comms { background: var(--cyan-bg); color: var(--cyan); }
  .tl-tag.done { background: var(--green-bg); color: var(--green); }

  /* ── Severity Banner ── */
  .sev-banner {
    padding: 8px 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    display: none;
  }
  .sev-banner.s1 { background: var(--red-bg); color: var(--red); border-bottom: 2px solid var(--red); display: block; }
  .sev-banner.s2 { background: var(--orange-bg); color: var(--orange); border-bottom: 2px solid var(--orange); display: block; }
  .sev-banner.s3 { background: var(--blue-bg); color: var(--blue); border-bottom: 2px solid var(--blue); display: block; }
  .sev-banner.s4 { background: var(--green-bg); color: var(--green); border-bottom: 2px solid var(--green); display: block; }

  /* ── Metrics bar ── */
  .metrics-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .metric {
    text-align: center;
    padding: 8px;
    background: var(--bg);
    border-radius: 8px;
  }
  .metric .val { font-family: monospace; font-size: 16px; font-weight: 700; }
  .metric .lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* ── Summary card ── */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .summary-stat {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .summary-stat .val { font-size: 28px; font-weight: 700; }
  .summary-stat .lbl { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .summary-stat.good .val { color: var(--green); }
  .summary-stat.warn .val { color: var(--orange); }
  .summary-stat.bad .val { color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 1100px) {
    .sidebar { display: none; }
  }
  @media (max-width: 800px) {
    .timeline-panel { display: none; }
    .stage { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1><span>&#9679;</span> Incident Management Simulator</h1>
  <div class="header-controls">
    <div class="timer" id="timer">00:00</div>
  </div>
</header>

<div class="app">
  <!-- Left sidebar: phase progress -->
  <aside class="sidebar">
    <h2>Phases</h2>
    <ul class="phase-list" id="phaseList"></ul>
  </aside>

  <!-- Center: interactive stage -->
  <div class="main">
    <div class="sev-banner" id="sevBanner"></div>
    <div class="stage" id="stage"></div>
  </div>

  <!-- Right: live timeline -->
  <div class="timeline-panel">
    <div class="timeline-header">
      <h2>Live Timeline</h2>
      <span class="comms-badge off" id="commsBadge">COMMS ACTIVE</span>
    </div>
    <div class="timeline-list" id="timelineList"></div>
    <div class="metrics-bar" id="metricsBar">
      <div class="metric"><div class="val" id="mttdVal">--</div><div class="lbl">MTTD</div></div>
      <div class="metric"><div class="val" id="mttrVal">--</div><div class="lbl">MTTR</div></div>
      <div class="metric"><div class="val" id="actionsVal">0</div><div class="lbl">Actions</div></div>
      <div class="metric"><div class="val" id="commsVal">0</div><div class="lbl">Comms Sent</div></div>
    </div>
  </div>
</div>

<script>
// ── State ──
const state = {
  scenario: null,
  severity: null,
  track: null,       // 'infra' or 'app'
  badData: null,
  phase: 0,
  timerStart: null,
  timerInterval: null,
  elapsed: 0,         // simulated seconds
  simSpeed: 1,
  actions: 0,
  comms: 0,
  mttd: null,
  mttr: null,
  phaseTimestamps: {},
  timelineEntries: [],
};

// ── Scenarios ──
const scenarios = [
  {
    id: 'core-down',
    title: 'Core Policy System Down',
    desc: 'Policy admin system unreachable. Agents cannot issue new policies or process endorsements.',
    sev: 1, track: 'infra',
    detection: 'Automated health-check fails on policy admin system. APM shows 100% error rate.',
  },
  {
    id: 'claims-calc',
    title: 'Claims Miscalculation',
    desc: 'Claims system paying incorrect benefit amounts due to a formula bug in the latest release.',
    sev: 1, track: 'app', badData: true,
    detection: 'Finance team reports claim payments 15% higher than expected in morning batch.',
  },
  {
    id: 'portal-slow',
    title: 'Customer Portal Degraded',
    desc: 'Customer self-service portal loading in 12+ seconds. Some pages timing out.',
    sev: 2, track: 'infra',
    detection: 'Synthetic monitoring detects response time > 10s. Support calls increasing.',
  },
  {
    id: 'premium-glitch',
    title: 'Premium Collection Error',
    desc: 'Recurring premium collection batch failed silently. 2,000 policies not collected.',
    sev: 2, track: 'app', badData: false,
    detection: 'Billing team notices missing collections in morning reconciliation report.',
  },
];

// ── Phases ──
const phases = [
  { key: 'detect',   icon: '&#128269;', name: 'Detection',          target: '< 5 min' },
  { key: 'triage',   icon: '&#9878;',   name: 'Triage & Classify',  target: '< 10 min' },
  { key: 'respond',  icon: '',           name: 'Response',           target: 'varies' },
  { key: 'resolve',  icon: '',           name: 'Resolution',         target: 'varies' },
  { key: 'restore',  icon: '&#9989;',    name: 'Service Restored',   target: '' },
  { key: 'rca',      icon: '&#128221;',  name: 'Root Cause Analysis', target: '< 48 hrs' },
  { key: 'close',    icon: '&#127937;',  name: 'Incident Closed',    target: '' },
];

// ── DOM helpers ──
const $ = (sel) => document.querySelector(sel);
const $id = (id) => document.getElementById(id);

function renderPhases() {
  const ul = $id('phaseList');
  ul.innerHTML = phases.map((p, i) => {
    const cls = i < state.phase ? 'done' : i === state.phase ? 'active' : '';
    const dotContent = i < state.phase ? '&#10003;' : p.icon || (i + 1);
    return `<li class="phase-item ${cls}">
      <div class="phase-dot">${dotContent}</div>
      <div class="phase-info">
        <h3>${p.name}</h3>
        ${p.target ? `<p>${p.target}</p>` : ''}
      </div>
    </li>`;
  }).join('');
}

function startTimer() {
  state.timerStart = Date.now();
  state.elapsed = 0;
  state.timerInterval = setInterval(() => {
    state.elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
    const m = String(Math.floor(state.elapsed / 60)).padStart(2, '0');
    const s = String(state.elapsed % 60).padStart(2, '0');
    const el = $id('timer');
    el.textContent = `${m}:${s}`;
    // Color based on severity
    el.className = 'timer';
    if (state.severity === 1 && state.elapsed > 120) el.classList.add('sev1');
    else if (state.severity === 2 && state.elapsed > 300) el.classList.add('sev2');
  }, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
}

function addTimeline(tag, text) {
  const m = String(Math.floor(state.elapsed / 60)).padStart(2, '0');
  const s = String(state.elapsed % 60).padStart(2, '0');
  const entry = { time: `${m}:${s}`, tag, text };
  state.timelineEntries.push(entry);
  const list = $id('timelineList');
  const div = document.createElement('div');
  div.className = 'tl-entry';
  div.innerHTML = `<span class="tl-time">${entry.time}</span>
    <span class="tl-content"><span class="tl-tag ${tag}">${tag.toUpperCase()}</span> ${text}</span>`;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
  state.actions++;
  $id('actionsVal').textContent = state.actions;
}

function addComms(text) {
  addTimeline('comms', text);
  state.comms++;
  $id('commsVal').textContent = state.comms;
}

function setSevBanner(sev) {
  const b = $id('sevBanner');
  b.className = `sev-banner s${sev}`;
  const labels = { 1: 'SEV1 — CRITICAL INCIDENT', 2: 'SEV2 — MAJOR INCIDENT', 3: 'SEV3 — MINOR INCIDENT', 4: 'SEV4 — LOW PRIORITY' };
  b.textContent = labels[sev] || '';
}

function updateMetric(id, val) {
  $id(id).textContent = val;
}

function formatTime(secs) {
  if (secs < 60) return `${secs}s`;
  return `${Math.floor(secs / 60)}m ${secs % 60}s`;
}

// ── Render stages ──
function renderStage() {
  const stage = $id('stage');
  renderPhases();

  switch (state.phase) {
    case 0: return renderScenarioSelect(stage);
    case 1: return renderDetection(stage);
    case 2: return renderTriage(stage);
    case 3: return renderResponse(stage);
    case 4: return renderResolution(stage);
    case 5: return renderRestore(stage);
    case 6: return renderRCA(stage);
    case 7: return renderClosed(stage);
  }
}

// Phase 0: Scenario selection
function renderScenarioSelect(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>Select Incident Scenario</h2>
    <p class="subtitle">Choose a simulated incident to walk through the management process</p>
    <p>Each scenario represents a realistic incident for a life insurance company. You'll make decisions at each phase of the response.</p>
    <div class="scenario-grid">
      ${scenarios.map(s => `
        <div class="scenario-card" onclick="selectScenario('${s.id}')">
          <h4>${s.title}</h4>
          <p>${s.desc}</p>
          <span class="sev-tag s${s.sev}">SEV${s.sev}</span>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function selectScenario(id) {
  state.scenario = scenarios.find(s => s.id === id);
  state.severity = state.scenario.sev;
  state.track = state.scenario.track;
  state.badData = state.scenario.badData;
  state.phase = 1;
  startTimer();
  renderStage();
}

// Phase 1: Detection
function renderDetection(el) {
  phases[2].icon = state.track === 'infra' ? '&#128737;' : '&#128300;';
  phases[2].name = state.track === 'infra' ? 'Containment' : 'Impact Assessment';
  phases[3].icon = state.track === 'infra' ? '&#128295;' : '&#129657;';
  phases[3].name = state.track === 'infra' ? 'Resolution & Recovery' : 'Fix & Validate';
  renderPhases();

  el.innerHTML = `<div class="stage-card">
    <h2>&#128269; Detection</h2>
    <p class="subtitle">Target: < 5 minutes</p>
    <p><strong>Scenario:</strong> ${state.scenario.title}</p>
    <p>${state.scenario.detection}</p>
    <div class="choices">
      <div class="choice-btn" onclick="handleDetection('auto')">
        <span class="icon">&#128225;</span>
        <div><div class="label">Automated Alert Detected</div>
        <div class="desc">Monitoring system triggered the alert automatically</div></div>
      </div>
      <div class="choice-btn" onclick="handleDetection('user')">
        <span class="icon">&#128100;</span>
        <div><div class="label">User / Stakeholder Reported</div>
        <div class="desc">A user or business stakeholder called in the issue</div></div>
      </div>
      <div class="choice-btn" onclick="handleDetection('health')">
        <span class="icon">&#128147;</span>
        <div><div class="label">Health Check Failed</div>
        <div class="desc">Scheduled health check or heartbeat detected the failure</div></div>
      </div>
    </div>
  </div>`;
}

function handleDetection(method) {
  const labels = { auto: 'Automated alert fired', user: 'Reported by user/stakeholder', health: 'Health-check failure detected' };
  addTimeline('detect', labels[method]);
  state.mttd = state.elapsed;
  updateMetric('mttdVal', formatTime(state.mttd));
  state.phase = 2;
  renderStage();
}

// Phase 2: Triage
function renderTriage(el) {
  const sc = state.scenario;
  el.innerHTML = `<div class="stage-card">
    <h2>&#9878;&#65039; Triage & Classify</h2>
    <p class="subtitle">Target: < 10 minutes</p>
    <p>Confirm the incident is real and classify it.</p>

    <ul class="checklist" id="triageChecklist">
      <li onclick="toggleCheck(this)" data-action="Incident confirmed as real">
        <span class="check"></span> Confirm this incident is real (not a false alarm)
      </li>
      <li onclick="toggleCheck(this)" data-action="Severity assigned: SEV${sc.sev}">
        <span class="check"></span> Assign severity: <strong style="color:${sc.sev===1?'var(--red)':sc.sev===2?'var(--orange)':'var(--blue)'}">SEV${sc.sev}</strong>
      </li>
      <li onclick="toggleCheck(this)" data-action="Incident Commander assigned">
        <span class="check"></span> Assign Incident Commander
      </li>
      <li onclick="toggleCheck(this)" data-action="Incident type classified: ${sc.track === 'infra' ? 'System DOWN' : 'System UP but behaving wrong'}">
        <span class="check"></span> Classify: <strong>${sc.track === 'infra' ? 'System is DOWN / unreachable' : 'System is UP but behaving wrong'}</strong>
      </li>
    </ul>
    <button class="proceed-btn" id="triageBtn" onclick="handleTriageComplete()">Proceed to ${sc.track === 'infra' ? 'Containment' : 'Impact Assessment'} &#8594;</button>
  </div>`;

  setSevBanner(sc.sev);
  addTimeline('triage', `Incident: ${sc.title}`);
  addComms(`Incident declared: ${sc.title} — SEV${sc.sev}`);
  $id('commsBadge').classList.remove('off');
}

function toggleCheck(li) {
  li.classList.toggle('checked');
  if (li.classList.contains('checked')) {
    li.querySelector('.check').innerHTML = '&#10003;';
    addTimeline('triage', li.dataset.action);
  } else {
    li.querySelector('.check').innerHTML = '';
  }
  const allChecked = document.querySelectorAll('#triageChecklist li.checked').length === document.querySelectorAll('#triageChecklist li').length;
  $id('triageBtn').classList.toggle('ready', allChecked);
}

function handleTriageComplete() {
  state.phase = 3;
  renderStage();
}

// Phase 3: Response (Containment or Impact Assessment)
function renderResponse(el) {
  if (state.track === 'infra') return renderContainment(el);
  return renderImpactAssessment(el);
}

function renderContainment(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>&#128737;&#65039; Containment</h2>
    <p class="subtitle">Target: < 30 minutes — Stop the bleeding</p>
    <p>Choose containment actions. Select all that apply, then proceed.</p>

    <ul class="checklist" id="containChecklist">
      <li onclick="toggleContain(this)" data-action="Failover initiated to healthy replica">
        <span class="check"></span> Failover to healthy region / replica
      </li>
      <li onclick="toggleContain(this)" data-action="Infrastructure change rolled back">
        <span class="check"></span> Roll back recent infra change (deploy / config)
      </li>
      <li onclick="toggleContain(this)" data-action="Crashed services restarted">
        <span class="check"></span> Restart crashed services / pods
      </li>
      <li onclick="toggleContain(this)" data-action="Maintenance page enabled / circuit breakers activated">
        <span class="check"></span> Enable maintenance page / circuit breakers
      </li>
    </ul>
    <button class="proceed-btn" id="containBtn" onclick="handleContainmentDone()">Proceed to Resolution &#8594;</button>
  </div>`;

  addComms(`Status update: Containment in progress for ${state.scenario.title}`);
}

function toggleContain(li) {
  li.classList.toggle('checked');
  li.querySelector('.check').innerHTML = li.classList.contains('checked') ? '&#10003;' : '';
  if (li.classList.contains('checked')) addTimeline('contain', li.dataset.action);
  const checked = document.querySelectorAll('#containChecklist li.checked').length;
  $id('containBtn').classList.toggle('ready', checked >= 1);
}

function handleContainmentDone() {
  state.phase = 4;
  renderStage();
}

function renderImpactAssessment(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>&#128300; Impact Assessment</h2>
    <p class="subtitle">Target: < 1 hour — Understand the scope</p>
    <p>Assess the impact of the incorrect behavior.</p>

    <ul class="checklist" id="assessChecklist">
      <li onclick="toggleAssess(this)" data-action="Incorrect behavior reproduced in staging">
        <span class="check"></span> Reproduce the incorrect behavior
      </li>
      <li onclick="toggleAssess(this)" data-action="Root cause identified: code bug / config / data issue">
        <span class="check"></span> Identify root cause (code bug, config, or data issue)
      </li>
      <li onclick="toggleAssess(this)" data-action="Data and financial impact quantified">
        <span class="check"></span> Quantify data & financial impact
      </li>
    </ul>
    <button class="proceed-btn" id="assessBtn" onclick="handleAssessmentDone()">Proceed to Fix & Validate &#8594;</button>
  </div>`;

  addComms(`Investigation underway: ${state.scenario.title}`);
}

function toggleAssess(li) {
  li.classList.toggle('checked');
  li.querySelector('.check').innerHTML = li.classList.contains('checked') ? '&#10003;' : '';
  if (li.classList.contains('checked')) addTimeline('assess', li.dataset.action);
  const allChecked = document.querySelectorAll('#assessChecklist li.checked').length === document.querySelectorAll('#assessChecklist li').length;
  $id('assessBtn').classList.toggle('ready', allChecked);
}

function handleAssessmentDone() {
  state.phase = 4;
  renderStage();
}

// Phase 4: Resolution
function renderResolution(el) {
  if (state.track === 'infra') return renderRecovery(el);
  return renderFixValidate(el);
}

function renderRecovery(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>&#128295; Resolution & Recovery</h2>
    <p class="subtitle">Apply durable fix and verify</p>

    <ul class="checklist" id="resolveChecklist">
      <li onclick="toggleResolve(this)" data-action="Durable fix applied to root cause">
        <span class="check"></span> Apply durable fix (not just restart)
      </li>
      <li onclick="toggleResolve(this)" data-action="All health checks passing green">
        <span class="check"></span> Verify all health checks are green
      </li>
      <li onclick="toggleResolve(this)" data-action="Monitored 15+ min with no regression">
        <span class="check"></span> Monitor &#8805; 15 min for regressions
      </li>
    </ul>
    <button class="proceed-btn" id="resolveBtn" onclick="handleResolveDone()">Confirm Service Restored &#10003;</button>
  </div>`;
}

function toggleResolve(li) {
  li.classList.toggle('checked');
  li.querySelector('.check').innerHTML = li.classList.contains('checked') ? '&#10003;' : '';
  if (li.classList.contains('checked')) addTimeline('resolve', li.dataset.action);
  const allChecked = document.querySelectorAll('#resolveChecklist li.checked').length === document.querySelectorAll('#resolveChecklist li').length;
  $id('resolveBtn').classList.toggle('ready', allChecked);
}

function handleResolveDone() {
  state.mttr = state.elapsed;
  updateMetric('mttrVal', formatTime(state.mttr));
  state.phase = 5;
  renderStage();
}

function renderFixValidate(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>&#129657; Fix & Validate</h2>
    <p class="subtitle">Develop, review, and deploy the fix</p>

    <ul class="checklist" id="fixChecklist">
      <li onclick="toggleFix(this)" data-action="Fix developed with unit/integration tests">
        <span class="check"></span> Develop fix + unit / integration tests
      </li>
      <li onclick="toggleFix(this)" data-action="Code review completed with extra scrutiny">
        <span class="check"></span> Code review with extra scrutiny
      </li>
      <li onclick="toggleFix(this)" data-action="QA validated fix in staging">
        <span class="check"></span> QA validates in staging environment
      </li>
      <li onclick="toggleFix(this)" data-action="Fix deployed and verified in production">
        <span class="check"></span> Deploy & verify in production
      </li>
    </ul>
    ${state.badData ? `
    <div style="margin-top: 20px; padding: 14px; background: var(--yellow-bg); border: 1px solid var(--yellow); border-radius: 10px;">
      <strong style="color: var(--yellow);">&#9888;&#65039; Bad Data Detected</strong>
      <p style="font-size: 13px; margin-top: 6px;">This incident wrote incorrect data. Data remediation will be required after the fix.</p>
    </div>` : ''}
    <button class="proceed-btn" id="fixBtn" onclick="handleFixDone()">
      ${state.badData ? 'Proceed to Data Remediation &#8594;' : 'Confirm Service Restored &#10003;'}
    </button>
  </div>`;
}

function toggleFix(li) {
  li.classList.toggle('checked');
  li.querySelector('.check').innerHTML = li.classList.contains('checked') ? '&#10003;' : '';
  if (li.classList.contains('checked')) addTimeline('fix', li.dataset.action);
  const allChecked = document.querySelectorAll('#fixChecklist li.checked').length === document.querySelectorAll('#fixChecklist li').length;
  $id('fixBtn').classList.toggle('ready', allChecked);
}

function handleFixDone() {
  if (state.badData) {
    renderDataRemediation($id('stage'));
    return;
  }
  state.mttr = state.elapsed;
  updateMetric('mttrVal', formatTime(state.mttr));
  state.phase = 5;
  renderStage();
}

function renderDataRemediation(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>&#128451;&#65039; Data Remediation</h2>
    <p class="subtitle">Correct the bad data written during the incident</p>

    <ul class="checklist" id="dataChecklist">
      <li onclick="toggleData(this)" data-action="Backup taken before correction scripts">
        <span class="check"></span> Run correction scripts (backup first!)
      </li>
      <li onclick="toggleData(this)" data-action="Reports, invoices, and balances recalculated">
        <span class="check"></span> Recalculate reports / invoices / balances
      </li>
      <li onclick="toggleData(this)" data-action="Affected customers notified of data correction">
        <span class="check"></span> Notify affected customers
      </li>
    </ul>
    <button class="proceed-btn" id="dataBtn" onclick="handleDataDone()">Confirm Service Restored &#10003;</button>
  </div>`;

  addComms('Data remediation in progress — affected customers will be notified');
}

function toggleData(li) {
  li.classList.toggle('checked');
  li.querySelector('.check').innerHTML = li.classList.contains('checked') ? '&#10003;' : '';
  if (li.classList.contains('checked')) addTimeline('data', li.dataset.action);
  const allChecked = document.querySelectorAll('#dataChecklist li.checked').length === document.querySelectorAll('#dataChecklist li').length;
  $id('dataBtn').classList.toggle('ready', allChecked);
}

function handleDataDone() {
  state.mttr = state.elapsed;
  updateMetric('mttrVal', formatTime(state.mttr));
  state.phase = 5;
  renderStage();
}

// Phase 5: Service Restored
function renderRestore(el) {
  addTimeline('done', 'Service restored');
  addComms('All-clear: Service has been restored');

  el.innerHTML = `<div class="stage-card" style="text-align:center;">
    <div style="font-size: 48px; margin-bottom: 12px;">&#9989;</div>
    <h2>Service Restored</h2>
    <p class="subtitle">The immediate incident is resolved</p>
    <p>Service is back to normal. Now conduct the Root Cause Analysis within 48 hours.</p>
    <button class="proceed-btn ready" onclick="goToRCA()" style="margin-top:20px;">Begin RCA Process &#8594;</button>
  </div>`;
}

function goToRCA() {
  state.phase = 6;
  renderStage();
}

// Phase 6: RCA
function renderRCA(el) {
  el.innerHTML = `<div class="stage-card">
    <h2>&#128221; Root Cause Analysis</h2>
    <p class="subtitle">Within 48 hours — Learn from the incident</p>

    <ul class="checklist" id="rcaChecklist">
      <li onclick="toggleRCA(this)" data-action="Blameless RCA meeting conducted">
        <span class="check"></span> Conduct blameless RCA meeting
      </li>
      <li onclick="toggleRCA(this)" data-action="Detailed incident timeline built">
        <span class="check"></span> Build detailed timeline of events
      </li>
      <li onclick="toggleRCA(this)" data-action="Root cause and contributing factors identified">
        <span class="check"></span> Identify root cause & contributing factors
      </li>
      <li onclick="toggleRCA(this)" data-action="Action items defined with owners and due dates">
        <span class="check"></span> Define action items with owners & dates
      </li>
      <li onclick="toggleRCA(this)" data-action="Runbooks and monitoring updated">
        <span class="check"></span> Update runbooks & monitoring
      </li>
    </ul>
    <button class="proceed-btn" id="rcaBtn" onclick="handleRCADone()">Close Incident &#127937;</button>
  </div>`;
}

function toggleRCA(li) {
  li.classList.toggle('checked');
  li.querySelector('.check').innerHTML = li.classList.contains('checked') ? '&#10003;' : '';
  if (li.classList.contains('checked')) addTimeline('rca', li.dataset.action);
  const allChecked = document.querySelectorAll('#rcaChecklist li.checked').length === document.querySelectorAll('#rcaChecklist li').length;
  $id('rcaBtn').classList.toggle('ready', allChecked);
}

function handleRCADone() {
  stopTimer();
  state.phase = 7;
  renderStage();
}

// Phase 7: Closed
function renderClosed(el) {
  addTimeline('done', 'Incident closed — RCA published, actions tracked in backlog');

  const rating = state.mttr < 120 ? 'good' : state.mttr < 300 ? 'warn' : 'bad';
  const ratingLabel = rating === 'good' ? 'Excellent' : rating === 'warn' ? 'Acceptable' : 'Needs Improvement';

  el.innerHTML = `<div class="stage-card" style="text-align:center;">
    <div style="font-size: 48px; margin-bottom: 12px;">&#127937;</div>
    <h2>Incident Closed</h2>
    <p class="subtitle">${state.scenario.title} — SEV${state.severity}</p>

    <div class="summary-grid">
      <div class="summary-stat">
        <div class="val">${formatTime(state.mttd || 0)}</div>
        <div class="lbl">Time to Detect</div>
      </div>
      <div class="summary-stat ${rating}">
        <div class="val">${formatTime(state.mttr || 0)}</div>
        <div class="lbl">Time to Restore</div>
      </div>
      <div class="summary-stat">
        <div class="val">${state.actions}</div>
        <div class="lbl">Actions Taken</div>
      </div>
      <div class="summary-stat">
        <div class="val">${state.comms}</div>
        <div class="lbl">Comms Sent</div>
      </div>
    </div>

    <div style="margin-top: 20px; padding: 14px; background: var(--surface2); border-radius: 10px;">
      <div style="font-size: 14px; color: var(--text-dim);">Response Rating</div>
      <div style="font-size: 20px; font-weight: 700; color: var(--${rating === 'good' ? 'green' : rating === 'warn' ? 'orange' : 'red'}); margin-top: 4px;">
        ${ratingLabel}
      </div>
      <div style="font-size: 12px; color: var(--text-dim); margin-top: 4px;">
        ${rating === 'good' ? 'Fast response. Well coordinated.' : rating === 'warn' ? 'Room for improvement in response time.' : 'Review your process — response was slow for this severity.'}
      </div>
    </div>

    <div style="margin-top: 20px; padding: 14px; background: var(--purple-bg); border: 1px solid var(--purple); border-radius: 10px; text-align: left;">
      <strong style="color: var(--purple);">Key Takeaways</strong>
      <ul style="font-size: 13px; margin-top: 8px; padding-left: 18px; color: var(--text-dim); line-height: 1.8;">
        <li>RCA is published and shared with the team</li>
        <li>Action items are tracked in sprint backlog with owners</li>
        <li>Runbooks and monitoring have been updated</li>
        <li>This incident contributes to quarterly pattern analysis</li>
      </ul>
    </div>

    <button class="restart-btn" onclick="restart()" style="margin-top: 24px;">&#8635; Run Another Scenario</button>
  </div>`;

  $id('commsBadge').classList.add('off');
}

function restart() {
  Object.assign(state, {
    scenario: null, severity: null, track: null, badData: null,
    phase: 0, timerStart: null, elapsed: 0, actions: 0, comms: 0,
    mttd: null, mttr: null, timelineEntries: [],
  });
  clearInterval(state.timerInterval);
  $id('timer').textContent = '00:00';
  $id('timer').className = 'timer';
  $id('sevBanner').className = 'sev-banner';
  $id('timelineList').innerHTML = '';
  $id('mttdVal').textContent = '--';
  $id('mttrVal').textContent = '--';
  $id('actionsVal').textContent = '0';
  $id('commsVal').textContent = '0';
  $id('commsBadge').classList.add('off');
  renderStage();
}

// ── Init ──
renderStage();
</script>
</body>
</html>
