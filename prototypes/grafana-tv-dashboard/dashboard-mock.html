<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKS Platform Observability - Grafana</title>
<style>
  /* ── Grafana exact color tokens ── */
  :root {
    --g-bg-canvas: #111217;
    --g-bg-primary: #181b1f;
    --g-bg-secondary: #22252b;
    --g-border-weak: #2c3035;
    --g-border-medium: #34383e;
    --g-text-primary: #ccccdc;
    --g-text-secondary: #8e8ea0;
    --g-text-disabled: #6e6e80;
    --g-navbar-bg: #1d1f25;
    --g-sidemenu-bg: #111217;
    --g-green: #73bf69;
    --g-yellow: #f2cc0c;
    --g-orange: #ff9830;
    --g-red: #f2495c;
    --g-blue: #5794f2;
    --g-purple: #b877d9;
    --g-super-light-blue: #6e9fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--g-bg-canvas);
    color: var(--g-text-primary);
    font-family: Inter, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
  }

  /* ════════════════════════════════════════
     GRAFANA LEFT SIDEBAR (collapsed)
     ════════════════════════════════════════ */
  .g-sidemenu {
    width: 56px;
    min-width: 56px;
    background: var(--g-sidemenu-bg);
    border-right: 1px solid var(--g-border-weak);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    z-index: 10;
  }
  .g-sidemenu-logo {
    width: 32px;
    height: 32px;
    margin-bottom: 16px;
    padding: 4px;
  }
  .g-sidemenu-item {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    margin-bottom: 2px;
    color: var(--g-text-disabled);
    cursor: pointer;
    transition: background 0.15s;
  }
  .g-sidemenu-item:hover { background: var(--g-bg-secondary); color: var(--g-text-primary); }
  .g-sidemenu-item.active { background: var(--g-bg-secondary); color: #fff; }
  .g-sidemenu-item svg { width: 20px; height: 20px; }
  .g-sidemenu-spacer { flex: 1; }

  /* ════════════════════════════════════════
     MAIN CONTENT AREA
     ════════════════════════════════════════ */
  .g-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ════════════════════════════════════════
     GRAFANA TOP NAVBAR
     ════════════════════════════════════════ */
  .g-navbar {
    height: 52px;
    min-height: 52px;
    background: var(--g-navbar-bg);
    border-bottom: 1px solid var(--g-border-weak);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  .g-navbar-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .g-navbar-folder {
    color: var(--g-text-secondary);
    font-size: 13px;
  }
  .g-navbar-sep {
    color: var(--g-text-disabled);
    font-size: 12px;
  }
  .g-navbar-title {
    font-weight: 500;
    font-size: 14px;
    color: var(--g-text-primary);
  }
  .g-navbar-spacer { flex: 1; }
  .g-navbar-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .g-btn {
    height: 32px;
    padding: 0 12px;
    border: 1px solid var(--g-border-medium);
    border-radius: 4px;
    background: transparent;
    color: var(--g-text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .g-btn:hover { color: var(--g-text-primary); border-color: var(--g-text-disabled); }
  .g-btn svg { width: 14px; height: 14px; }
  .g-time-picker {
    background: var(--g-bg-secondary);
    border: 1px solid var(--g-border-medium);
    border-radius: 4px;
    padding: 0 10px;
    height: 32px;
    color: var(--g-text-primary);
    font-size: 12px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .g-time-picker svg { width: 14px; height: 14px; color: var(--g-text-secondary); }
  .g-refresh-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--g-border-medium);
    border-radius: 4px;
    background: transparent;
    color: var(--g-text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .g-refresh-interval {
    font-size: 12px;
    color: var(--g-text-secondary);
    border: 1px solid var(--g-border-medium);
    border-radius: 4px;
    padding: 0 8px;
    height: 32px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    background: transparent;
  }
  .g-cycle-view {
    font-size: 12px;
    color: var(--g-text-disabled);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .g-kiosk-indicator {
    font-size: 10px;
    color: var(--g-text-disabled);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid var(--g-border-weak);
    border-radius: 3px;
  }

  /* ════════════════════════════════════════
     DASHBOARD BODY — GRAFANA PANEL GRID
     ════════════════════════════════════════ */
  .g-dashboard-scroll {
    flex: 1;
    overflow: hidden;
    padding: 8px;
  }
  .g-dashboard {
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Row header (Grafana collapsible row) ── */
  .g-row-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
    height: 28px;
    min-height: 28px;
    cursor: pointer;
  }
  .g-row-chevron {
    width: 14px;
    height: 14px;
    color: var(--g-text-disabled);
    transform: rotate(90deg);
  }
  .g-row-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--g-text-primary);
  }
  .g-row-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .g-row-line {
    flex: 1;
    height: 1px;
    background: var(--g-border-weak);
  }
  .g-row-tag-healthy { background: rgba(115,191,105,0.15); color: var(--g-green); }
  .g-row-tag-warning { background: rgba(242,204,12,0.15); color: var(--g-yellow); }
  .g-row-tag-critical { background: rgba(242,73,92,0.15); color: var(--g-red); }

  /* ── Panel row grid ── */
  .g-panel-row {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    min-height: 0;
  }

  /* ── Grafana Panel ── */
  .g-panel {
    background: var(--g-bg-primary);
    border: 1px solid var(--g-border-weak);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .g-panel:hover { border-color: var(--g-border-medium); }

  .g-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    height: 28px;
    min-height: 28px;
    border-bottom: 1px solid var(--g-border-weak);
  }
  .g-panel-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--g-text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .g-panel-menu {
    color: var(--g-text-disabled);
    cursor: pointer;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .g-panel:hover .g-panel-menu { opacity: 1; }

  .g-panel-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
    position: relative;
    min-height: 0;
  }

  /* ── Grafana Stat visualization ── */
  .g-stat-value {
    font-size: clamp(20px, 2.8vw, 38px);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .g-stat-unit {
    font-size: 14px;
    color: var(--g-text-disabled);
    font-weight: 400;
    margin-left: 2px;
  }
  .g-stat-description {
    font-size: 11px;
    color: var(--g-text-secondary);
    margin-top: 4px;
  }

  /* ── Grafana Gauge visualization ── */
  .g-gauge-track {
    width: 85%;
    height: 8px;
    background: var(--g-bg-secondary);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .g-gauge-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }
  .g-gauge-label {
    width: 85%;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--g-text-secondary);
    margin-bottom: 2px;
  }
  .g-gauge-pct {
    font-weight: 600;
  }

  /* ── Status dot (Grafana style) ── */
  .g-status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-bottom: 8px;
  }
  .g-status-dot.healthy { background: var(--g-green); box-shadow: 0 0 6px rgba(115,191,105,0.4); }
  .g-status-dot.warning { background: var(--g-yellow); box-shadow: 0 0 6px rgba(242,204,12,0.4); }
  .g-status-dot.critical {
    background: var(--g-red);
    box-shadow: 0 0 6px rgba(242,73,92,0.4);
    animation: g-pulse 1.5s ease-in-out infinite;
  }

  @keyframes g-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(242,73,92,0.4); }
    50% { box-shadow: 0 0 14px rgba(242,73,92,0.7); }
  }

  /* ── Color utilities ── */
  .c-green { color: var(--g-green); }
  .c-yellow { color: var(--g-yellow); }
  .c-orange { color: var(--g-orange); }
  .c-red { color: var(--g-red); }
  .c-blue { color: var(--g-blue); }

  /* ── Sparkline (Grafana graph panel mini) ── */
  .g-sparkline {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    opacity: 0.2;
    pointer-events: none;
  }
  .g-sparkline svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .g-sparkline .line { fill: none; stroke-width: 1.5; }
  .g-sparkline .fill { stroke: none; opacity: 0.4; }

  /* ── Grafana threshold bar at bottom ── */
  .g-threshold-bar {
    height: 3px;
    width: 100%;
  }

  /* ── Trend indicator (Grafana style) ── */
  .g-trend {
    font-size: 10px;
    font-weight: 500;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .g-trend svg { width: 10px; height: 10px; }
  .g-trend-up { color: var(--g-red); }
  .g-trend-down { color: var(--g-green); }
  .g-trend-flat { color: var(--g-text-disabled); }

  /* ── Alert badges (Grafana alert annotation style) ── */
  .g-alert-stack {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .g-alert-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .g-alert-tag.crit { background: rgba(242,73,92,0.15); color: var(--g-red); }
  .g-alert-tag.warn { background: rgba(242,204,12,0.15); color: var(--g-yellow); }
  .g-alert-tag.info { background: rgba(87,148,242,0.15); color: var(--g-blue); }
  .g-alert-tag.ok   { background: rgba(115,191,105,0.15); color: var(--g-green); }

  /* ── SLA Gauge (Grafana gauge panel) ── */
  .g-sla-gauge {
    position: relative;
    width: 70px;
    height: 70px;
  }
  .g-sla-gauge svg { transform: rotate(-90deg); }
  .g-sla-gauge-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .g-sla-pct {
    font-size: 14px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .g-sla-target {
    font-size: 9px;
    color: var(--g-text-disabled);
  }

  /* ── Grafana-like "no data" / empty ── */
  .g-empty {
    color: var(--g-text-disabled);
    font-size: 12px;
  }
</style>
</head>

// ── System data ──
const systems = [
  {
    name: "System A", cluster: "eks-prod-apse1", namespace: "system-a-prod",
    pods: { ready: 12, total: 12 }, health: "healthy",
    uptime: 99.97, slaTarget: 99.95,
    latencyP95: 42, latencyP50: 18, latencyTrend: "down",
    errorRate: 0.02, errorTrend: "flat",

  },
  {

    pods: { ready: 8, total: 8 }, health: "warning",
    uptime: 99.82, slaTarget: 99.90,
    latencyP95: 185, latencyP50: 72, latencyTrend: "up",
    errorRate: 1.24, errorTrend: "up",

  },
  {

    pods: { ready: 6, total: 6 }, health: "healthy",
    uptime: 99.99, slaTarget: 99.95,
    latencyP95: 28, latencyP50: 11, latencyTrend: "flat",
    errorRate: 0.01, errorTrend: "down",
    throughput: 8920, throughputTrend: "up",
    cpu: 38, memory: 51,
    alerts: { critical: 0, warning: 0, info: 0 }
  },
  {
    name: "System D", cluster: "eks-prod-apse1", namespace: "system-d-prod",
    pods: { ready: 3, total: 5 }, health: "critical",
    uptime: 98.41, slaTarget: 99.90,
    latencyP95: 1240, latencyP50: 420, latencyTrend: "up",
    errorRate: 8.73, errorTrend: "up",
    throughput: 620, throughputTrend: "down",
    cpu: 94, memory: 91,
    alerts: { critical: 2, warning: 3, info: 1 }
  }
];

// ── Helpers ──
function sparkSVG(color, trend, jitter) {
  const n = 40; const vals = []; let v = 50 + (Math.random() - 0.5) * 20;
  for (let i = 0; i < n; i++) {
    v += (Math.random() - 0.5) * (jitter ? 16 : 6);
    if (trend === "up") v += 0.5;
    if (trend === "down") v -= 0.3;
    v = Math.max(5, Math.min(95, v));
    vals.push(v);
  }
  const w = 300, h = 60, step = w / (n - 1);
  const pts = vals.map((v, i) => `${(i * step).toFixed(1)},${(h - v / 100 * h).toFixed(1)}`);
  const line = `M${pts.join(" L")}`;
  const fill = `${line} L${w},${h} L0,${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="fill" d="${fill}" fill="${color}"/>
    <path class="line" d="${line}" stroke="${color}"/>
  </svg>`;
}

function slaGaugeSVG(pct, color) {
  const r = 28, cx = 35, cy = 35, circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  return `<svg width="70" height="70" viewBox="0 0 70 70">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--g-bg-secondary)" stroke-width="5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
  </svg>`;
}

function trendHTML(trend) {
  if (trend === "up") return `<div class="g-trend g-trend-up">
    <svg viewBox="0 0 10 10"><path d="M5 1 L9 6 L6 6 L6 9 L4 9 L4 6 L1 6 Z" fill="currentColor"/></svg>rising</div>`;
  if (trend === "down") return `<div class="g-trend g-trend-down">
    <svg viewBox="0 0 10 10"><path d="M5 9 L9 4 L6 4 L6 1 L4 1 L4 4 L1 4 Z" fill="currentColor"/></svg>falling</div>`;
  return `<div class="g-trend g-trend-flat">
    <svg viewBox="0 0 10 10"><rect x="1" y="4" width="8" height="2" rx="1" fill="currentColor"/></svg>stable</div>`;
}

function colorForHealth(h) {
  return { healthy: "var(--g-green)", warning: "var(--g-yellow)", critical: "var(--g-red)" }[h] || "var(--g-text-disabled)";
}
function colorForLatency(ms) { return ms < 100 ? "var(--g-green)" : ms < 500 ? "var(--g-yellow)" : "var(--g-red)"; }
function colorForError(e) { return e < 0.1 ? "var(--g-green)" : e < 1 ? "var(--g-yellow)" : e < 5 ? "var(--g-orange)" : "var(--g-red)"; }
function colorForResource(v) { return v < 60 ? "var(--g-green)" : v < 80 ? "var(--g-yellow)" : "var(--g-red)"; }

// ── Build dashboard ──
const dashboard = document.getElementById("dashboard");

systems.forEach(sys => {
  const hc = colorForHealth(sys.health);
  const slaMet = sys.uptime >= sys.slaTarget;
  const slaColor = slaMet ? "var(--g-green)" : "var(--g-red)";
  const latC = colorForLatency(sys.latencyP95);
  const errC = colorForError(sys.errorRate);
  const cpuC = colorForResource(sys.cpu);
  const memC = colorForResource(sys.memory);
  const totAlerts = sys.alerts.critical + sys.alerts.warning + sys.alerts.info;
  const alertColor = sys.alerts.critical > 0 ? "var(--g-red)" : totAlerts > 0 ? "var(--g-yellow)" : "var(--g-green)";

  // Row header
  const rowHeader = document.createElement("div");
  rowHeader.className = "g-row-header";
  const tagClass = { healthy: "g-row-tag-healthy", warning: "g-row-tag-warning", critical: "g-row-tag-critical" }[sys.health];
  rowHeader.innerHTML = `
    <svg class="g-row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span class="g-row-title">${sys.name}</span>
    <span class="g-row-tag ${tagClass}">${sys.health.toUpperCase()}</span>
    <span style="font-size:11px;color:var(--g-text-disabled)">${sys.cluster} / ${sys.namespace}</span>
    <span style="font-size:11px;color:var(--g-text-disabled)">Pods: ${sys.pods.ready}/${sys.pods.total}</span>
    <div class="g-row-line"></div>
  `;

  // Panel row
  const panelRow = document.createElement("div");
  panelRow.className = "g-panel-row";

  panelRow.innerHTML = `
    <!-- 1. Health Status -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Health Status</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-status-dot ${sys.health}"></div>
        <div class="g-stat-value" style="color:${hc}">${sys.health.toUpperCase()}</div>
        <div class="g-stat-description">${sys.pods.ready}/${sys.pods.total} pods ready</div>
      </div>
      <div class="g-threshold-bar" style="background:${hc}"></div>
    </div>

    <!-- 2. Uptime / SLA -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Uptime / SLA</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-sla-gauge">
          ${slaGaugeSVG(sys.uptime, slaColor)}
          <div class="g-sla-gauge-label">
            <span class="g-sla-pct" style="color:${slaColor}">${sys.uptime.toFixed(2)}%</span>
            <span class="g-sla-target">target ${sys.slaTarget}%</span>
          </div>
        </div>
        <div class="g-stat-description" style="margin-top:6px">
          SLA ${slaMet
            ? '<span style="color:var(--g-green);font-weight:600">MET</span>'
            : '<span style="color:var(--g-red);font-weight:600">BREACH</span>'}
        </div>
      </div>
      <div class="g-threshold-bar" style="background:${slaColor}"></div>
    </div>

    <!-- 3. Latency P95 -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Latency P95</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${latC}">${
          sys.latencyP95 >= 1000
            ? (sys.latencyP95/1000).toFixed(1) + '<span class="g-stat-unit">s</span>'
            : sys.latencyP95 + '<span class="g-stat-unit">ms</span>'
        }</div>
        <div class="g-stat-description">P50: ${sys.latencyP50}ms</div>
        ${trendHTML(sys.latencyTrend)}
        <div class="g-sparkline">${sparkSVG(latC, sys.latencyTrend, sys.health === 'critical')}</div>
      </div>
      <div class="g-threshold-bar" style="background:${latC}"></div>
    </div>

    <!-- 4. Error Rate -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Error Rate</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${errC}">${sys.errorRate}<span class="g-stat-unit">%</span></div>
        <div class="g-stat-description">5xx / total requests</div>
        ${trendHTML(sys.errorTrend)}
        <div class="g-sparkline">${sparkSVG(errC, sys.errorTrend, sys.errorRate > 5)}</div>
      </div>
      <div class="g-threshold-bar" style="background:${errC}"></div>
    </div>

    <!-- 5. Throughput -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Throughput</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:var(--g-blue)">${
          sys.throughput >= 1000
            ? (sys.throughput/1000).toFixed(1) + 'K'
            : sys.throughput
        }<span class="g-stat-unit">rpm</span></div>
        ${trendHTML(sys.throughputTrend)}
        <div class="g-sparkline">${sparkSVG('var(--g-blue)', sys.throughputTrend, false)}</div>
      </div>
      <div class="g-threshold-bar" style="background:var(--g-blue)"></div>
    </div>

    <!-- 6. Resources -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">CPU / Memory</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body" style="gap:2px;justify-content:center">
        <div class="g-gauge-label">
          <span>CPU</span>
          <span class="g-gauge-pct" style="color:${cpuC}">${sys.cpu}%</span>
        </div>
        <div class="g-gauge-track">
          <div class="g-gauge-fill" style="width:${sys.cpu}%;background:${cpuC}"></div>
        </div>
        <div class="g-gauge-label" style="margin-top:8px">
          <span>Memory</span>
          <span class="g-gauge-pct" style="color:${memC}">${sys.memory}%</span>
        </div>
        <div class="g-gauge-track">
          <div class="g-gauge-fill" style="width:${sys.memory}%;background:${memC}"></div>
        </div>
      </div>
      <div class="g-threshold-bar" style="background:${sys.cpu > sys.memory ? cpuC : memC}"></div>
    </div>

    <!-- 7. Active Alerts -->
    <div class="g-panel">
      <div class="g-panel-header">
        <span class="g-panel-title">Active Alerts</span>
        <span class="g-panel-menu">&#8942;</span>
      </div>
      <div class="g-panel-body">
        <div class="g-stat-value" style="color:${alertColor}">${totAlerts}</div>
        <div class="g-stat-description">firing</div>
        <div class="g-alert-stack">
          ${sys.alerts.critical > 0 ? `<span class="g-alert-tag crit">${sys.alerts.critical} P1</span>` : ''}
          ${sys.alerts.warning > 0 ? `<span class="g-alert-tag warn">${sys.alerts.warning} P2</span>` : ''}
          ${sys.alerts.info > 0 ? `<span class="g-alert-tag info">${sys.alerts.info} P3</span>` : ''}
          ${totAlerts === 0 ? '<span class="g-alert-tag ok">ALL CLEAR</span>' : ''}
        </div>
      </div>
      <div class="g-threshold-bar" style="background:${alertColor}"></div>
    </div>
  `;

  dashboard.appendChild(rowHeader);
  dashboard.appendChild(panelRow);
});

// ── Clock ──
function tick() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleDateString("en-GB", { day:"2-digit", month:"short" }) + " " +
    now.toLocaleTimeString("en-GB", { hour12: false });
}
tick(); setInterval(tick, 1000);

// ── Animate sparklines subtly ──
setInterval(() => {
  document.querySelectorAll('.g-sparkline .line').forEach(path => {
    const d = path.getAttribute('d');
    if (!d) return;
    const segs = d.split(' ');
    const idx = 2 + Math.floor(Math.random() * (segs.length - 4));
    if (segs[idx] && segs[idx].includes(',')) {
      const [x, y] = segs[idx].replace('L','').split(',').map(Number);
      if (!isNaN(y)) {
        const ny = Math.max(2, Math.min(58, y + (Math.random()-0.5) * 3));
        segs[idx] = (segs[idx].startsWith('L') ? 'L' : '') + x.toFixed(1) + ',' + ny.toFixed(1);
        path.setAttribute('d', segs.join(' '));
      }
    }
  });
}, 2500);
</script>
</body>
</html>
