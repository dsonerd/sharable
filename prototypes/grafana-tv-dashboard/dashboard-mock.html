<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKS Systems — TV Dashboard</title>
<style>
  :root {
    --bg-dark: #111217;
    --bg-panel: #181b1f;
    --bg-panel-header: #1e2028;
    --border: #2c2f3a;
    --text-primary: #d8d9da;
    --text-secondary: #8e8fa0;
    --text-muted: #6c6d80;
    --green: #73bf69;
    --green-bg: rgba(115,191,105,0.08);
    --yellow: #f2cc0c;
    --yellow-bg: rgba(242,204,12,0.08);
    --orange: #ff9830;
    --orange-bg: rgba(255,152,48,0.08);
    --red: #f2495c;
    --red-bg: rgba(242,73,92,0.08);
    --blue: #5794f2;
    --blue-bg: rgba(87,148,242,0.08);
    --purple: #b877d9;
    --cyan: #8ab8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 40px;
    padding: 0 16px;
    background: var(--bg-panel-header);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { width: 20px; height: 20px; }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .topbar-env {
    background: var(--green);
    color: #000;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .topbar-right { display: flex; align-items: center; gap: 16px; color: var(--text-secondary); }
  .topbar-clock { font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 500; }
  .topbar-refresh { color: var(--text-muted); font-size: 11px; }

  /* ── Column headers ── */
  .col-headers {
    display: grid;
    grid-template-columns: 120px repeat(7, 1fr);
    gap: 4px;
    padding: 8px 8px 0 8px;
  }
  .col-header {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 6px 0;
  }
  .col-header-icon { font-size: 13px; display: block; margin-bottom: 2px; }

  /* ── Grid ── */
  .dashboard {
    display: grid;
    grid-template-rows: repeat(4, 1fr);
    gap: 4px;
    padding: 4px 8px 8px 8px;
    height: calc(100vh - 40px - 42px);
  }

  .system-row {
    display: grid;
    grid-template-columns: 120px repeat(7, 1fr);
    gap: 4px;
  }

  /* ── System label ── */
  .system-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
  }
  .system-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .system-cluster {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .system-pods {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 6px;
  }
  .system-pods span {
    color: var(--green);
    font-weight: 600;
  }

  /* ── Panel ── */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .panel-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    position: relative;
  }

  /* ── Stat value ── */
  .stat-value {
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat-unit {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 2px;
  }
  .stat-sub {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .stat-trend {
    font-size: 10px;
    margin-top: 2px;
    font-weight: 600;
  }
  .trend-up { color: var(--red); }
  .trend-down { color: var(--green); }
  .trend-flat { color: var(--text-muted); }

  /* ── Status indicator ── */
  .status-healthy .stat-value { color: var(--green); }
  .status-warning .stat-value { color: var(--yellow); }
  .status-degraded .stat-value { color: var(--orange); }
  .status-critical .stat-value { color: var(--red); }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-bottom: 6px;
  }
  .status-dot.healthy { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.warning { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .status-dot.degraded { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .status-dot.critical { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red); }
    50% { opacity: 0.5; box-shadow: 0 0 16px var(--red); }
  }

  /* ── Sparkline ── */
  .sparkline {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35%;
    opacity: 0.25;
  }
  .sparkline svg { width: 100%; height: 100%; }
  .sparkline path { fill: none; stroke-width: 1.5; }
  .sparkline .area { stroke: none; opacity: 0.3; }

  /* ── Gauge bar ── */
  .gauge-bar {
    width: 80%;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .gauge-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  /* ── Alert badges ── */
  .alert-badges {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 4px;
  }
  .alert-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
  }
  .alert-badge.crit { background: var(--red-bg); color: var(--red); }
  .alert-badge.warn { background: var(--yellow-bg); color: var(--yellow); }
  .alert-badge.info { background: var(--blue-bg); color: var(--blue); }
  .alert-badge.ok { background: var(--green-bg); color: var(--green); }

  /* ── SLA bar ── */
  .sla-ring {
    width: 48px;
    height: 48px;
    position: relative;
  }
  .sla-ring svg { transform: rotate(-90deg); }
  .sla-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  /* ── Thresholds stripe ── */
  .threshold-stripe {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }
  .threshold-stripe.green { background: var(--green); }
  .threshold-stripe.yellow { background: var(--yellow); }
  .threshold-stripe.orange { background: var(--orange); }
  .threshold-stripe.red { background: var(--red); }

  /* ── Tooltip ── */
  .panel[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="topbar-left">
    <svg class="topbar-logo" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="topbar-title">EKS Platform — System Observability</span>
    <span class="topbar-env">PRODUCTION</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-refresh">Auto-refresh: 30s</span>
    <span style="color:var(--text-muted)">|</span>
    <span style="font-size:11px">Last 1h</span>
    <span style="color:var(--text-muted)">|</span>
    <span class="topbar-clock" id="clock"></span>
  </div>
</div>

<!-- ── Column headers ── -->
<div class="col-headers">
  <div class="col-header"></div>
  <div class="col-header"><span class="col-header-icon">&#9679;</span>Health</div>
  <div class="col-header"><span class="col-header-icon">&#8593;</span>Uptime / SLA</div>
  <div class="col-header"><span class="col-header-icon">&#9201;</span>Latency P95</div>
  <div class="col-header"><span class="col-header-icon">&#9889;</span>Error Rate</div>
  <div class="col-header"><span class="col-header-icon">&#8644;</span>Throughput</div>
  <div class="col-header"><span class="col-header-icon">&#9881;</span>Resources</div>
  <div class="col-header"><span class="col-header-icon">&#9888;</span>Alerts</div>
</div>

<!-- ── Dashboard grid ── -->
<div class="dashboard" id="dashboard"></div>

<script>
// ── Data model ──
const systems = [
  {
    name: "System A",
    cluster: "eks-prod-ap-southeast-1",
    pods: { ready: 12, total: 12 },
    health: "healthy",
    uptime: 99.97,
    slaTarget: 99.95,
    latencyP95: 42,
    latencyP50: 18,
    latencyTrend: "down",
    errorRate: 0.02,
    errorTrend: "flat",
    throughput: 3420,
    throughputUnit: "rpm",
    throughputTrend: "up",
    cpu: 45,
    memory: 62,
    alerts: { critical: 0, warning: 0, info: 1 },
    color: "#5794f2"
  },
  {
    name: "System B",
    cluster: "eks-prod-ap-southeast-1",
    pods: { ready: 8, total: 8 },
    health: "warning",
    uptime: 99.82,
    slaTarget: 99.90,
    latencyP95: 185,
    latencyP50: 72,
    latencyTrend: "up",
    errorRate: 1.24,
    errorTrend: "up",
    throughput: 1850,
    throughputUnit: "rpm",
    throughputTrend: "flat",
    cpu: 72,
    memory: 78,
    alerts: { critical: 0, warning: 2, info: 1 },
    color: "#f2cc0c"
  },
  {
    name: "System C",
    cluster: "eks-prod-ap-southeast-1",
    pods: { ready: 6, total: 6 },
    health: "healthy",
    uptime: 99.99,
    slaTarget: 99.95,
    latencyP95: 28,
    latencyP50: 11,
    latencyTrend: "flat",
    errorRate: 0.01,
    errorTrend: "down",
    throughput: 8920,
    throughputUnit: "rpm",
    throughputTrend: "up",
    cpu: 38,
    memory: 51,
    alerts: { critical: 0, warning: 0, info: 0 },
    color: "#73bf69"
  },
  {
    name: "System D",
    cluster: "eks-prod-ap-southeast-1",
    pods: { ready: 3, total: 5 },
    health: "critical",
    uptime: 98.41,
    slaTarget: 99.90,
    latencyP95: 1240,
    latencyP50: 420,
    latencyTrend: "up",
    errorRate: 8.73,
    errorTrend: "up",
    throughput: 620,
    throughputUnit: "rpm",
    throughputTrend: "down",
    cpu: 94,
    memory: 91,
    alerts: { critical: 2, warning: 3, info: 1 },
    color: "#f2495c"
  }
];

// ── Sparkline generator ──
function sparklineSVG(color, trend, volatile) {
  const pts = 30;
  const vals = [];
  let v = 50 + (Math.random() - 0.5) * 20;
  for (let i = 0; i < pts; i++) {
    v += (Math.random() - 0.5) * (volatile ? 18 : 8);
    if (trend === "up") v += 0.6;
    if (trend === "down") v -= 0.4;
    v = Math.max(10, Math.min(90, v));
    vals.push(v);
  }
  const w = 200, h = 50;
  const step = w / (pts - 1);
  const points = vals.map((v, i) => `${i * step},${h - (v / 100) * h}`);
  const line = `M${points.join(" L")}`;
  const area = `${line} L${w},${h} L0,${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="area" d="${area}" fill="${color}"/>
    <path d="${line}" stroke="${color}"/>
  </svg>`;
}

// ── SLA ring ──
function slaRingSVG(pct, color) {
  const r = 20, c = 24, circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  return `<svg width="48" height="48" viewBox="0 0 48 48">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
  </svg>`;
}

// ── Trend arrow ──
function trendHTML(trend) {
  if (trend === "up") return '<span class="stat-trend trend-up">&#9650; rising</span>';
  if (trend === "down") return '<span class="stat-trend trend-down">&#9660; falling</span>';
  return '<span class="stat-trend trend-flat">&#9644; stable</span>';
}

// ── Build rows ──
const dashboard = document.getElementById("dashboard");

systems.forEach(sys => {
  const row = document.createElement("div");
  row.className = "system-row";

  const healthColor = { healthy: "var(--green)", warning: "var(--yellow)", degraded: "var(--orange)", critical: "var(--red)" }[sys.health];
  const slaColor = sys.uptime >= sys.slaTarget ? "var(--green)" : "var(--red)";
  const slaMet = sys.uptime >= sys.slaTarget;
  const latColor = sys.latencyP95 < 100 ? "var(--green)" : sys.latencyP95 < 500 ? "var(--yellow)" : "var(--red)";
  const latStripe = sys.latencyP95 < 100 ? "green" : sys.latencyP95 < 500 ? "yellow" : "red";
  const errColor = sys.errorRate < 0.1 ? "var(--green)" : sys.errorRate < 1 ? "var(--yellow)" : sys.errorRate < 5 ? "var(--orange)" : "var(--red)";
  const errStripe = sys.errorRate < 0.1 ? "green" : sys.errorRate < 1 ? "yellow" : sys.errorRate < 5 ? "orange" : "red";
  const cpuColor = sys.cpu < 60 ? "var(--green)" : sys.cpu < 80 ? "var(--yellow)" : "var(--red)";
  const memColor = sys.memory < 60 ? "var(--green)" : sys.memory < 80 ? "var(--yellow)" : "var(--red)";
  const totalAlerts = sys.alerts.critical + sys.alerts.warning + sys.alerts.info;

  row.innerHTML = `
    <!-- System label -->
    <div class="system-label" style="border-left: 3px solid ${healthColor};">
      <div class="system-name">${sys.name}</div>
      <div class="system-cluster">${sys.cluster.split("-").slice(1).join("-")}</div>
      <div class="system-pods">Pods <span>${sys.pods.ready}/${sys.pods.total}</span></div>
    </div>

    <!-- 1. Health -->
    <div class="panel status-${sys.health}">
      <div class="panel-body">
        <div class="status-dot ${sys.health}"></div>
        <div class="stat-value">${sys.health.toUpperCase()}</div>
        <div class="stat-sub">${sys.pods.ready}/${sys.pods.total} pods ready</div>
      </div>
    </div>

    <!-- 2. Uptime / SLA -->
    <div class="panel">
      <div class="threshold-stripe ${slaMet ? 'green' : 'red'}"></div>
      <div class="panel-body">
        <div class="sla-ring">
          ${slaRingSVG(sys.uptime, slaMet ? 'var(--green)' : 'var(--red)')}
          <div class="sla-ring-text" style="color:${slaColor}">${sys.uptime.toFixed(1)}%</div>
        </div>
        <div class="stat-sub" style="margin-top:4px">SLA ${sys.slaTarget}% ${slaMet ? '<span style="color:var(--green)">MET</span>' : '<span style="color:var(--red)">BREACH</span>'}</div>
      </div>
    </div>

    <!-- 3. Latency P95 -->
    <div class="panel">
      <div class="threshold-stripe ${latStripe}"></div>
      <div class="panel-body">
        <div class="stat-value" style="color:${latColor}">${sys.latencyP95 >= 1000 ? (sys.latencyP95/1000).toFixed(1) : sys.latencyP95}<span class="stat-unit">${sys.latencyP95 >= 1000 ? 's' : 'ms'}</span></div>
        <div class="stat-sub">P50: ${sys.latencyP50}ms</div>
        ${trendHTML(sys.latencyTrend)}
        <div class="sparkline">${sparklineSVG(latColor, sys.latencyTrend, sys.health === 'critical')}</div>
      </div>
    </div>

    <!-- 4. Error Rate -->
    <div class="panel">
      <div class="threshold-stripe ${errStripe}"></div>
      <div class="panel-body">
        <div class="stat-value" style="color:${errColor}">${sys.errorRate}<span class="stat-unit">%</span></div>
        <div class="stat-sub">5xx / total</div>
        ${trendHTML(sys.errorTrend)}
        <div class="sparkline">${sparklineSVG(errColor, sys.errorTrend, sys.errorRate > 5)}</div>
      </div>
    </div>

    <!-- 5. Throughput -->
    <div class="panel">
      <div class="panel-body">
        <div class="stat-value" style="color:var(--blue)">${sys.throughput >= 1000 ? (sys.throughput/1000).toFixed(1) + 'K' : sys.throughput}<span class="stat-unit">${sys.throughputUnit}</span></div>
        ${trendHTML(sys.throughputTrend)}
        <div class="sparkline">${sparklineSVG('var(--blue)', sys.throughputTrend, false)}</div>
      </div>
    </div>

    <!-- 6. Resources (CPU / Memory) -->
    <div class="panel">
      <div class="panel-body" style="gap:4px">
        <div style="width:80%;display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary)">
          <span>CPU</span><span style="color:${cpuColor};font-weight:700">${sys.cpu}%</span>
        </div>
        <div class="gauge-bar" style="width:80%">
          <div class="gauge-fill" style="width:${sys.cpu}%;background:${cpuColor}"></div>
        </div>
        <div style="width:80%;display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin-top:6px">
          <span>MEM</span><span style="color:${memColor};font-weight:700">${sys.memory}%</span>
        </div>
        <div class="gauge-bar" style="width:80%">
          <div class="gauge-fill" style="width:${sys.memory}%;background:${memColor}"></div>
        </div>
      </div>
    </div>

    <!-- 7. Alerts -->
    <div class="panel">
      <div class="panel-body">
        <div class="stat-value" style="color:${sys.alerts.critical > 0 ? 'var(--red)' : totalAlerts > 0 ? 'var(--yellow)' : 'var(--green)'}">${totalAlerts}</div>
        <div class="stat-sub">active</div>
        <div class="alert-badges">
          ${sys.alerts.critical > 0 ? `<span class="alert-badge crit">${sys.alerts.critical} CRIT</span>` : ''}
          ${sys.alerts.warning > 0 ? `<span class="alert-badge warn">${sys.alerts.warning} WARN</span>` : ''}
          ${sys.alerts.info > 0 ? `<span class="alert-badge info">${sys.alerts.info} INFO</span>` : ''}
          ${totalAlerts === 0 ? '<span class="alert-badge ok">ALL CLEAR</span>' : ''}
        </div>
      </div>
    </div>
  `;

  dashboard.appendChild(row);
});

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("en-GB", { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

// ── Simulate live sparkline updates ──
setInterval(() => {
  document.querySelectorAll('.sparkline').forEach(el => {
    const svg = el.querySelector('svg');
    if (!svg) return;
    const path = svg.querySelector('path:last-child');
    if (!path) return;
    // subtle jitter to make it look alive
    const d = path.getAttribute('d');
    if (d) {
      const parts = d.split(' ');
      // shift one random point slightly
      const idx = Math.floor(Math.random() * parts.length);
      if (parts[idx] && parts[idx].includes(',')) {
        const [x, y] = parts[idx].replace(/[ML]/g, '').split(',').map(Number);
        if (!isNaN(y)) {
          const newY = Math.max(2, Math.min(48, y + (Math.random() - 0.5) * 4));
          parts[idx] = parts[idx].replace(/[\d.]+$/, newY.toFixed(1));
          path.setAttribute('d', parts.join(' '));
        }
      }
    }
  });
}, 2000);
</script>
</body>
</html>
